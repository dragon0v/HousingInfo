name: Build and Release

# 只有在推送以 'v' 开头的 tag 时才触发，例如 v0.0.5
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    # 必须开启写入权限，否则 GitHub Action 无法创建 Release
    permissions:
      contents: write 

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.0

      - name: Set up Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci # 在 CI 环境中，推荐使用 npm ci 替代 npm install，它会严格按照 package-lock.json 安装，速度更快且不出错

      - name: Run build
        run: npm run build

      - name: Compress extension folder
        # Plasmo 默认构建产物在 build/chrome-mv3-prod。
        # 进入该目录进行压缩，避免解压后出现多层嵌套文件夹
        run: |
          cd build/chrome-mv3-prod
          zip -r ../../extension.zip ./*

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2.1.0
        with:
          files: extension.zip
          generate_release_notes: true # 自动根据 commit 生成 Release Note
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}